# parent
# ├── yolov5
# └── data
#          └── NECK_HYOID
#                     ├── train
#                     └── valid
#                             └── images  
#                             └── labels 


# Train/val/test sets as 1) dir: path/to/imgs, 2) file: path/to/imgs.txt, or 3) list: [path/to/imgs1, path/to/imgs2, ..]

path: ./data/NECK_HYOID      # dataset root dir
train: ../images/train   # train images (relative to 'path') 
val: ../images/valid    # val images (relative to 'path') 

# 학습용 및 검증용 레이블 폴더는 자동으로 찾음 (images 폴더와 같은 위치의 labels 폴더)

# number of classes
nc: 3

# Classes
names:
  0: hyoid_bone
  1: neck_bone
  2: coin